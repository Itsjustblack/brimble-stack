services:
  postgres:
    image: postgres:16
    container_name: mini-paas-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mini_paas
    ports:
      - "5432:5432"
    networks:
      - mini-paas-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mini-paas-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mini-paas-network
    command: redis-server --appendonly yes

  api:
    build:
      context: ./server
      target: runtime-api
    container_name: mini-paas-api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://admin:password123@postgres:5432/mini_paas
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    networks:
      - mini-paas-network
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./server
      target: runtime-worker
    container_name: mini-paas-worker
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://admin:password123@postgres:5432/mini_paas
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # Enable BuildKit
      DOCKER_BUILDKIT: 1

      # Railpack directories
      TMPDIR: /var/lib/railpack/tmp
      HOME: /var/lib/railpack/home
      XDG_CACHE_HOME: /var/lib/railpack/cache
      MISE_CACHE_DIR: /var/lib/railpack/mise/cache
      MISE_DATA_DIR: /var/lib/railpack/mise/data
      MISE_CONFIG_DIR: /var/lib/railpack/mise/config

      # cloned repos live here
      REPO_DIR: /app/repos

    volumes:
      - cloned_repos:/app/repos
      - /var/run/docker.sock:/var/run/docker.sock

    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

    networks:
      - mini-paas-network

  caddy:
    image: caddy:2
    container_name: mini-paas-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      - mini-paas-network
    volumes:
      - ./conf:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config

networks:
  mini-paas-network:
    name: mini-paas-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  cloned_repos:
  caddy_data:
  caddy_config:
